version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecombot_postgres
    environment:
      POSTGRES_DB: ecombot_db
      POSTGRES_USER: ecombot_user
      POSTGRES_PASSWORD: ecombot_password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecombot_user -d ecombot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecombot_network

  redis:
    image: redis:7-alpine
    container_name: ecombot_redis
    command: redis-server --requirepass redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecombot_network

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: ecombot_chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/chroma/data"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecombot_network

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  ecombot_network:
    driver: bridge
